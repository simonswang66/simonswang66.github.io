<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>宝宝乐园</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Comic Sans MS", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #fef9e7 0%, #fdebd0 30%, #f9e5b3 60%, #fce4d6 100%);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* 背景装饰 */
    .bg-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-decor span {
      position: absolute;
      font-size: 40px;
      animation: floatAround 6s infinite ease-in-out;
      opacity: 0.5;
    }
    .bg-decor span:nth-child(1) { top: 8%; left: 10%; animation-delay: 0s; }
    .bg-decor span:nth-child(2) { top: 15%; right: 12%; animation-delay: 1.2s; font-size: 34px; }
    .bg-decor span:nth-child(3) { bottom: 18%; left: 8%; animation-delay: 2.4s; font-size: 36px; }
    .bg-decor span:nth-child(4) { bottom: 12%; right: 15%; animation-delay: 3.6s; }
    .bg-decor span:nth-child(5) { top: 45%; left: 3%; animation-delay: 0.8s; font-size: 28px; }
    .bg-decor span:nth-child(6) { top: 40%; right: 5%; animation-delay: 2s; font-size: 30px; }

    @keyframes floatAround {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(8deg); }
    }

    /* 顶部导航 */
    .top-bar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.75);
      color: #b45f2b;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      border: 2px solid #ffe0b0;
      transition: all 0.2s;
    }
    .back-link:hover {
      background: rgba(255,255,255,0.95);
      border-color: #f5c070;
    }

    .page-title {
      font-size: 36px;
      color: #e65c1e;
      text-shadow: 2px 2px 0 #ffd966;
      letter-spacing: 2px;
      position: relative;
      z-index: 10;
    }
    .page-subtitle {
      font-size: 16px;
      color: #c25d1a;
      margin-bottom: 40px;
      position: relative;
      z-index: 10;
      font-weight: 500;
    }

    /* 游戏卡片 */
    .games-grid {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 10;
      max-width: 900px;
      width: 100%;
    }

    .game-card {
      flex: 1 1 260px;
      max-width: 320px;
      min-width: 240px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 36px 24px 28px;
      text-align: center;
      text-decoration: none;
      border: 4px solid #ffe8c0;
      box-shadow: 0 8px 24px rgba(180, 100, 40, 0.12);
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 36px rgba(180, 100, 40, 0.2);
      border-color: #f5c070;
    }
    .game-card:active {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(180, 100, 40, 0.15);
    }

    .game-icon {
      font-size: 64px;
      line-height: 1;
      animation: bounceIcon 2s infinite;
    }
    .game-card:nth-child(2) .game-icon {
      animation-delay: 0.5s;
    }

    @keyframes bounceIcon {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-12px); }
      50% { transform: translateY(0); }
      70% { transform: translateY(-6px); }
    }

    .game-name {
      font-size: 22px;
      font-weight: 700;
      color: #e65c1e;
    }
    .game-desc {
      font-size: 14px;
      color: #b08a5c;
      line-height: 1.6;
    }
    .game-tag {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, #fff3cd, #ffe0a0);
      color: #c25d1a;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-decor">
  <span>🌟</span><span>🧸</span><span>🎈</span><span>🐣</span><span>🌈</span><span>💖</span>
</div>

<!-- 返回链接 -->
<div class="top-bar">
  <a class="back-link" href="../index.html">&#8592; 返回首页</a>
</div>

<h1 class="page-title">🎠 宝宝乐园</h1>
<p class="page-subtitle">选一个游戏开始玩吧！</p>

<div class="games-grid">
  <a class="game-card" href="字母学习乐园.html">
    <div class="game-icon">⌨️🐰</div>
    <div class="game-name">字母学习乐园</div>
    <div class="game-desc">认识大写字母和数字<br>按键盘对应按键来答题</div>
    <div class="game-tag">🎯 学习模式</div>
  </a>

  <a class="game-card" href="魔法敲击乐园.html">
    <div class="game-icon">🎹✨</div>
    <div class="game-name">魔法敲击乐园</div>
    <div class="game-desc">随意敲击键盘<br>字母蹦蹦跳 + 音乐 + 动画</div>
    <div class="game-tag">🎪 自由玩耍</div>
  </a>

  <a class="game-card" href="趣味画板.html">
    <div class="game-icon">🖍️🎨</div>
    <div class="game-name">趣味画板</div>
    <div class="game-desc">触控板蜡笔画<br>自由涂鸦 + 英文数字书写 + 你画我猜</div>
    <div class="game-tag">🖌️ 创意绘画</div>
  </a>
</div>

</body>
</html>
